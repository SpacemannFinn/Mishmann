<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #18181e; }
      .text-main { font-family: 'DejaVu Sans', 'Inter', sans-serif; font-size: 20px; font-weight: bold; fill: #f0f0f5; }
      .text-row { font-family: 'DejaVu Sans', 'Inter', sans-serif; font-size: 15px; fill: #f0f0f5; }
      .text-sub { font-family: 'DejaVu Sans', 'Inter', sans-serif; font-size: 14px; fill: #969ba5; }
      .accent-line { fill: #e86a26; }
      .divider { fill: #32323a; }
      .ok-text { font-family: 'DejaVu Sans', 'Inter', sans-serif; font-size: 15px; font-weight: bold; fill: #78d282; text-anchor: end; }
    </style>
  </defs>
  <rect class="bg" width="480" height="320" />
  
  <!-- Header -->
  <text x="20" y="34" class="text-main">Checking systems…</text>
  <rect x="0" y="48" width="480" height="2" class="divider" />
  <rect x="20" y="45" width="40" height="3" class="accent-line" />

  <!-- Checks -->
  <g transform="translate(0, 15)">
    <text x="20" y="55" class="text-row">Display &amp; GPIO</text>
    <text x="460" y="55" class="ok-text">OK</text>

    <text x="20" y="81" class="text-row">Buttons</text>
    <text x="460" y="81" class="ok-text">OK</text>

    <text x="20" y="107" class="text-row">Backlight</text>
    <text x="460" y="107" class="ok-text">OK</text>

    <text x="20" y="133" class="text-row">Audio pipeline</text>
    <text x="460" y="133" class="ok-text">OK</text>

    <text x="20" y="159" class="text-row">Music library</text>
    <text x="460" y="159" class="ok-text">OK</text>

    <text x="20" y="185" class="text-row">Bluetooth</text>
    <text x="460" y="185" class="ok-text">OK</text>

    <text x="20" y="211" class="text-row">Wi-Fi</text>
    <text x="460" y="211" class="ok-text">OK</text>

    <text x="20" y="237" class="text-row">Upload server deps</text>
    <text x="460" y="237" class="ok-text">OK</text>
  </g>

  <!-- Footer -->
  <text x="20" y="300" class="text-sub">All critical checks passed. Starting player…</text>
</svg>